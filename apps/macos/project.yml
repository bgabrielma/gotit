name: GotIt
options:
  bundleIdPrefix: dev.gotit
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  GotItModels:
    path: Packages/GotItModels
  GotItInfra:
    path: Packages/GotItInfra
  GotItUI:
    path: Packages/GotItUI

targets:
  GotIt:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: App
    info:
      path: App/Info.plist
      properties:
        LSUIElement: true
        NSScreenCaptureUsageDescription: "GotIt! re-captures your active display when you click \"Look again\" so the model can see what you're working on."
        NSDesktopFolderUsageDescription: "GotIt! reads screenshots you save with Cmd+Shift+3/4/5 so it can route them into the panel."
        CFBundleIdentifier: dev.gotit.GotIt
        CFBundleName: GotIt
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
    entitlements:
      path: App/GotIt.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.gotit.GotIt
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: false
    dependencies:
      - package: GotItModels
      - package: GotItInfra
      - package: GotItUI

  GotItUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: GotItUITests
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: "-"
        TEST_TARGET_NAME: GotIt
    dependencies:
      - target: GotIt
